<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.WEATHER LAND — 관리자</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F2F5;color:#111;height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}

    /* 로그인 */
    #login{display:flex;align-items:center;justify-content:center;height:100vh;background:#F0F2F5}
    .login-card{background:#fff;border-radius:20px;padding:48px 40px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:360px}
    .login-card .icon{font-size:52px}
    .login-card h1{font-size:22px;font-weight:800;color:#111}
    .login-card p{font-size:13px;color:#888}
    .login-card input{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;font-size:20px;text-align:center;letter-spacing:8px;outline:none;background:#F8F8F8}
    .login-card input:focus{border-color:#2A5480}
    .err{font-size:13px;color:#C0392B;min-height:18px}
    .btn-primary{width:100%;padding:15px;background:#2A5480;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
    .btn-primary:hover{background:#1A3A52}
    .btn-link{background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:4px 0}

    /* 대시보드 */
    #dashboard{display:none;flex-direction:column;height:100vh;overflow:hidden}
    .top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:#fff;border-bottom:1px solid #E0E0E0;flex-shrink:0}
    .top-bar-left{display:flex;align-items:center;gap:12px}
    .top-bar h1{font-size:17px;font-weight:800;color:#111}
    .top-bar span{font-size:11px;color:#888}
    .top-bar-right{display:flex;align-items:center;gap:10px}
    .btn-sm{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
    .btn-refresh{background:#E8EEF4;color:#2A5480}
    .btn-refresh:hover{background:#d0dce9}
    .btn-exit{background:#eee;color:#555}
    .btn-exit:hover{background:#ddd}

    /* stats */
    .stats-bar{display:flex;gap:10px;padding:12px 24px;background:#fff;border-bottom:1px solid #E0E0E0;overflow-x:auto;flex-shrink:0}
    .stat{background:#E8EEF4;border-radius:12px;padding:10px 18px;display:flex;flex-direction:column;align-items:center;min-width:90px}
    .stat-num{font-size:22px;font-weight:800;color:#2A5480}
    .stat-lbl{font-size:10px;color:#666;margin-top:2px}

    /* tabs */
    .tabs{display:flex;background:#fff;border-bottom:1px solid #E0E0E0;flex-shrink:0;overflow-x:auto}
    .tab{padding:12px 20px;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
    .tab.active{color:#2A5480;font-weight:700;border-bottom-color:#2A5480}

    /* toolbar */
    .toolbar{display:flex;align-items:center;gap:10px;padding:10px 24px;background:#F8F8F8;border-bottom:1px solid #E0E0E0;flex-shrink:0}
    .search-box{flex:1;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:7px 12px}
    .search-box input{border:none;outline:none;font-size:13px;flex:1;color:#111}
    .search-box svg{flex-shrink:0}
    .btn-csv{display:flex;align-items:center;gap:5px;background:#2A5480;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer}
    .btn-csv:hover{background:#1A3A52}
    .btn-sheets{display:flex;align-items:center;gap:5px;background:#0F9D58;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer}
    .btn-sheets:hover{background:#0b7a44}

    /* table */
    .table-wrap{flex:1;overflow-y:auto}
    table{width:100%;border-collapse:collapse;font-size:12px}
    thead tr{background:#E8EEF4;position:sticky;top:0}
    th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:#2A5480;white-space:nowrap}
    td{padding:10px 16px;border-bottom:1px solid #F0F0F0;color:#333}
    tr:nth-child(even) td{background:#FAFAFA}
    .empty{text-align:center;padding:60px 20px;color:#888;font-size:14px;line-height:26px}

    .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
    .badge-custom{background:#E8EEF4;color:#2A5480}
    .badge-server{background:#F0F0F0;color:#666}
    .badge-ok{background:#E8F5E9;color:#27AE60}
    .badge-no{color:#bbb}

    /* sheets modal */
    #sheets-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;align-items:center;justify-content:center}
    #sheets-modal.open{display:flex}
    .sheets-card{background:#fff;border-radius:16px;padding:32px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
    .sheets-card h2{font-size:18px;font-weight:800;margin-bottom:12px}
    .sheets-card p{font-size:13px;color:#555;line-height:22px;margin-bottom:12px}
    .sheets-card code{display:block;background:#F4F4F4;border-radius:8px;padding:12px;font-size:12px;color:#111;word-break:break-all;margin-bottom:12px;user-select:all}
    .sheets-card .close-btn{margin-top:8px;width:100%;padding:12px;background:#E8EEF4;border:none;border-radius:10px;font-size:14px;font-weight:700;color:#2A5480;cursor:pointer}

    .loading{display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:14px}
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login">
  <div class="login-card">
    <span class="icon">&#x1F512;</span>
    <h1>관리자 포털</h1>
    <p>S.WEATHER LAND Admin Dashboard</p>
    <input type="password" id="pin-input" placeholder="관리자 PIN" maxlength="8" inputmode="numeric" />
    <span class="err" id="err-msg"></span>
    <button class="btn-primary" onclick="doLogin()">접속하기</button>
    <button class="btn-link" onclick="location.href='/'">← 앱으로 돌아가기</button>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard">
  <div class="top-bar">
    <div class="top-bar-left">
      <span style="font-size:20px">&#x1F512;</span>
      <div>
        <h1>관리자 포털</h1>
        <span>S.WEATHER LAND</span>
      </div>
    </div>
    <div class="top-bar-right">
      <span id="loading-indicator" style="font-size:12px;color:#888;display:none">로딩 중…</span>
      <button class="btn-sm btn-refresh" onclick="loadAll()">↻ 새로고침</button>
      <button class="btn-sm btn-exit" onclick="logout()">나가기</button>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>
  <div class="tabs" id="tabs"></div>

  <div class="toolbar">
    <div class="search-box">
      <svg width="14" height="14" fill="none" stroke="#aaa" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="검색…" oninput="render()" />
    </div>
    <button class="btn-csv" onclick="downloadCSV()">&#x2B07; CSV 다운로드</button>
    <button class="btn-sheets" onclick="openSheets()">&#x1F4CA; Google Sheets 연동</button>
  </div>

  <div class="table-wrap" id="table-wrap">
    <div class="loading">데이터를 불러오는 중…</div>
  </div>
</div>

<!-- Google Sheets 안내 모달 -->
<div id="sheets-modal">
  <div class="sheets-card">
    <h2>&#x1F4CA; Google Sheets 자동 연동</h2>
    <p>Google Sheets에서 아래 수식을 셀에 입력하면 데이터가 자동으로 불러와집니다.</p>

    <p><strong>회원 명단</strong></p>
    <code id="sheet-url-members"></code>

    <p><strong>감정 기록</strong></p>
    <code id="sheet-url-moods"></code>

    <p><strong>미션 기록</strong></p>
    <code id="sheet-url-missions"></code>

    <p><strong>일별 활동</strong></p>
    <code id="sheet-url-daily"></code>

    <p style="font-size:12px;color:#999">
      Google Sheets에서 빈 셀 클릭 후 위 수식을 붙여넣고 Enter를 누르세요.
    </p>
    <button class="close-btn" onclick="document.getElementById('sheets-modal').classList.remove('open')">닫기</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ifctmlafvrhbshdfrjxz.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_GlOZZ9Bmg45GXDdmKM_58w_7k0HI3O4';
  const ADMIN_PIN    = '1234';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let data = { members: [], moods: [], missions: [], daily: [] };
  let currentTab = 'members';

  /* 로그인 */
  document.addEventListener('DOMContentLoaded', function() {
    var inp = document.getElementById('pin-input');
    if (inp) inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  });

  async function doLogin() {
    var pin = document.getElementById('pin-input').value.trim();
    if (pin !== ADMIN_PIN) {
      document.getElementById('err-msg').textContent = 'PIN이 올바르지 않아요';
      document.getElementById('pin-input').value = '';
      return;
    }
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
    await loadAll();
  }

  function logout() {
    document.getElementById('login').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pin-input').value = '';
    data = { members: [], moods: [], missions: [], daily: [] };
  }

  /* 데이터 로드 */
  async function loadAll() {
    var li = document.getElementById('loading-indicator');
    if (li) li.style.display = 'inline';
    try {
      var r = await Promise.all([
        db.from('user_profiles').select('username,real_name,student_id,phone,emoji,created_at,friend_code,sweat_points').order('created_at', { ascending: false }),
        db.from('mood_logs').select('*').order('logged_at', { ascending: false }),
        db.from('mission_logs').select('*').order('logged_at', { ascending: false }),
        db.from('daily_records').select('*').order('record_date', { ascending: false }),
      ]);
      data.members  = r[0].data || [];
      data.moods    = r[1].data || [];
      data.missions = r[2].data || [];
      data.daily    = r[3].data || [];
    } catch(e) { console.error(e); }
    if (li) li.style.display = 'none';
    renderStats();
    renderTabs();
    render();
  }

  /* KST 시간 포맷 */
  function fmtKST(iso) {
    if (!iso) return '—';
    var d = new Date(new Date(iso).getTime() + 9 * 3600 * 1000);
    return d.getUTCFullYear() + '-' + pad(d.getUTCMonth()+1) + '-' + pad(d.getUTCDate()) + ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes());
  }
  function pad(n) { return String(n).padStart(2, '0'); }

  /* 통계 */
  function renderStats() {
    var fullDays   = data.daily.filter(function(d) { return d.all_missions_done; }).length;
    var missionUsr = (new Set(data.missions.map(function(m) { return m.username; }))).size;
    var avgMiss    = missionUsr > 0 ? Math.round(data.missions.length / missionUsr) : 0;
    var chips = [
      { n: data.members.length,  l: '총 회원' },
      { n: data.moods.length,    l: '감정 기록' },
      { n: data.missions.length, l: '미션 완료' },
      { n: fullDays,             l: '배터리 충전일' },
      { n: missionUsr,           l: '활동 회원' },
      { n: avgMiss,              l: '인당 미션' },
    ];
    document.getElementById('stats-bar').innerHTML =
      chips.map(function(c) {
        return '<div class="stat"><span class="stat-num">' + c.n + '</span><span class="stat-lbl">' + c.l + '</span></div>';
      }).join('');
  }

  /* 탭 */
  var TABS = [
    { key: 'members',  label: '회원 명단' },
    { key: 'moods',    label: '감정 기록' },
    { key: 'missions', label: '미션 기록' },
    { key: 'daily',    label: '일별 활동' },
  ];

  function renderTabs() {
    document.getElementById('tabs').innerHTML = TABS.map(function(t) {
      return '<div class="tab ' + (t.key === currentTab ? 'active' : '') + '" onclick="switchTab(\'' + t.key + '\')">' + t.label + ' (' + data[t.key].length + ')</div>';
    }).join('');
  }

  function switchTab(key) {
    currentTab = key;
    var si = document.getElementById('search-input');
    if (si) si.value = '';
    renderTabs();
    render();
  }

  /* 테이블 렌더 */
  function render() {
    renderTabs();
    var q = ((document.getElementById('search-input') || {}).value || '').toLowerCase();
    var rows = filter(data[currentTab], q);
    var wrap = document.getElementById('table-wrap');

    if (rows.length === 0) {
      wrap.innerHTML = '<div class="empty">데이터가 없습니다.<br><small>Supabase에 테이블이 생성되어 있는지 확인해주세요.</small></div>';
      return;
    }

    if (currentTab === 'members')  wrap.innerHTML = renderMembers(rows);
    if (currentTab === 'moods')    wrap.innerHTML = renderMoods(rows);
    if (currentTab === 'missions') wrap.innerHTML = renderMissions(rows);
    if (currentTab === 'daily')    wrap.innerHTML = renderDaily(rows);
  }

  function filter(arr, q) {
    if (!q) return arr;
    return arr.filter(function(r) {
      return Object.values(r).some(function(v) { return String(v || '').toLowerCase().includes(q); });
    });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMembers(rows) {
    var head = '<thead><tr><th>#</th><th>아이디</th><th>본명</th><th>학번</th><th>전화번호</th><th>이모지</th><th>친구코드</th><th>포인트</th><th>가입일</th></tr></thead>';
    var body = rows.map(function(r, i) {
      return '<tr><td>'+(i+1)+'</td><td><strong>'+esc(r.username)+'</strong></td><td>'+esc(r.real_name)+'</td><td>'+esc(r.student_id)+'</td><td>'+esc(r.phone)+'</td><td style="font-size:18px">'+esc(r.emoji)+'</td><td>#'+esc(r.friend_code)+'</td><td>'+(r.sweat_points||0)+'</td><td>'+fmtKST(r.created_at)+'</td></tr>';
    }).join('');
    return '<table>'+head+'<tbody>'+body+'</tbody></table>';
  }

  function renderMoods(rows) {
    var head = '<thead><tr><th>#</th><th>사용자</th><th>감정</th><th>메모</th><th>기록일시(KST)</th></tr></thead>';
    var body = rows.map(function(r, i) {
      return '<tr><td>'+(i+1)+'</td><td>'+esc(r.user_name)+'</td><td>'+esc(r.mood_label)+'</td><td style="color:#666">'+esc(r.memo||'—')+'</td><td>'+fmtKST(r.logged_at)+'</td></tr>';
    }).join('');
    return '<table>'+head+'<tbody>'+body+'</tbody></table>';
  }

  function renderMissions(rows) {
    var head = '<thead><tr><th>#</th><th>사용자</th><th>미션</th><th>타입</th><th>포인트</th><th>스탯</th><th>완료일시(KST)</th></tr></thead>';
    var body = rows.map(function(r, i) {
      var badge = r.mission_type === 'custom'
        ? '<span class="badge badge-custom">나만의</span>'
        : '<span class="badge badge-server">추천</span>';
      return '<tr><td>'+(i+1)+'</td><td>'+esc(r.username)+'</td><td>'+esc(r.mission_label)+'</td><td>'+badge+'</td><td>'+esc(r.points)+'</td><td>'+esc(r.stat)+'</td><td>'+fmtKST(r.logged_at)+'</td></tr>';
    }).join('');
    return '<table>'+head+'<tbody>'+body+'</tbody></table>';
  }

  function renderDaily(rows) {
    var head = '<thead><tr><th>#</th><th>사용자</th><th>날짜</th><th>미션 완료</th><th>에너지 100</th><th>완료 수</th></tr></thead>';
    var body = rows.map(function(r, i) {
      return '<tr><td>'+(i+1)+'</td><td>'+esc(r.username)+'</td><td>'+esc(r.record_date)+'</td>'
        +'<td>'+(r.all_missions_done ? '<span class="badge badge-ok">완료</span>' : '<span class="badge-no">—</span>')+'</td>'
        +'<td>'+(r.energy_100 ? '<span class="badge badge-ok">달성</span>' : '<span class="badge-no">—</span>')+'</td>'
        +'<td>'+esc(r.missions_completed)+'</td></tr>';
    }).join('');
    return '<table>'+head+'<tbody>'+body+'</tbody></table>';
  }

  /* CSV 다운로드 */
  function downloadCSV() {
    var q    = ((document.getElementById('search-input') || {}).value || '').toLowerCase();
    var rows = filter(data[currentTab], q);
    var date = new Date().toISOString().slice(0, 10);
    var header, body;

    if (currentTab === 'members') {
      header = ['번호','아이디','본명','학번','전화번호','이모지','친구코드','포인트','가입일'];
      body   = rows.map(function(r, i) { return [i+1, r.username, r.real_name||'', r.student_id||'', r.phone||'', r.emoji||'', r.friend_code||'', r.sweat_points||0, fmtKST(r.created_at)]; });
    } else if (currentTab === 'moods') {
      header = ['번호','사용자','감정ID','감정','메모','기록일시(KST)'];
      body   = rows.map(function(r, i) { return [i+1, r.user_name, r.mood_id, r.mood_label, r.memo||'', fmtKST(r.logged_at)]; });
    } else if (currentTab === 'missions') {
      header = ['번호','사용자','미션','타입','포인트','스탯','완료일시(KST)'];
      body   = rows.map(function(r, i) { return [i+1, r.username, r.mission_label, r.mission_type, r.points, r.stat, fmtKST(r.logged_at)]; });
    } else {
      header = ['번호','사용자','날짜','미션완료','에너지100','완료수'];
      body   = rows.map(function(r, i) { return [i+1, r.username, r.record_date, r.all_missions_done?'O':'X', r.energy_100?'O':'X', r.missions_completed]; });
    }

    var BOM  = '﻿';
    var csv  = BOM + [header].concat(body).map(function(r) {
      return r.map(function(c) { return '"' + String(c).replace(/"/g,'""') + '"'; }).join(',');
    }).join('\n');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url;
    a.download = 'sweatherland_' + currentTab + '_' + date + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  /* Google Sheets 연동 안내 */
  function openSheets() {
    var base = location.origin + '/api/export';
    document.getElementById('sheet-url-members').textContent  = '=IMPORTDATA("' + base + '?table=members")';
    document.getElementById('sheet-url-moods').textContent    = '=IMPORTDATA("' + base + '?table=moods")';
    document.getElementById('sheet-url-missions').textContent = '=IMPORTDATA("' + base + '?table=missions")';
    document.getElementById('sheet-url-daily').textContent    = '=IMPORTDATA("' + base + '?table=daily")';
    document.getElementById('sheets-modal').classList.add('open');
  }

  document.getElementById('sheets-modal').addEventListener('click', function(e) {
    if (e.target === document.getElementById('sheets-modal'))
      document.getElementById('sheets-modal').classList.remove('open');
  });
</script>
</body>
</html>
