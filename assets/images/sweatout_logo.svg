<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 310" width="520" height="310">
  <!-- SWEAT - top word, slightly rotated for brush feel -->
  <g transform="rotate(-4, 260, 120)">
    <text
      x="260" y="140"
      font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
      font-size="148"
      font-weight="900"
      fill="#1A3352"
      text-anchor="middle"
      letter-spacing="-4"
      paint-order="stroke"
      stroke="#1A3352"
      stroke-width="6"
      stroke-linejoin="round"
    >SWEAT</text>
  </g>

  <!-- OUT - bottom word -->
  <g transform="rotate(-4, 260, 255)">
    <text
      x="265" y="268"
      font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
      font-size="164"
      font-weight="900"
      fill="#1A3352"
      text-anchor="middle"
      letter-spacing="-6"
      paint-order="stroke"
      stroke="#1A3352"
      stroke-width="6"
      stroke-linejoin="round"
    >OUT</text>
  </g>

  <!-- Underline under OUT -->
  <path
    d="M 60 288 Q 180 296 300 292 Q 390 288 470 296"
    stroke="#1A3352"
    stroke-width="9"
    stroke-linecap="round"
    fill="none"
  />
</svg>
